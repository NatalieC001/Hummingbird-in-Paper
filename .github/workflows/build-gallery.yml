name: Build Gallery

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create complete gallery HTML file
        run: |
          mkdir -p _site
          
          cat > _site/index.html << 'EOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>Hummingbird in Paper - Process Gallery</title>
            <!-- Google Fonts: Bricolage Grotesque for headings, Zalando Sans for body text -->
            <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,300;12..96,400;12..96,500;12..96,600;12..96,700&family=Zalando+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
            <style>
              * { margin: 0; padding: 0; box-sizing: border-box; }
              
              body {
                font-family: 'Zalando Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
                background-color: #eaddcb;
                /* Mixed grid: large drafting squares and subtle noise dots */
                background-image: 
                  linear-gradient(rgba(170, 155, 135, 0.3) 1px, transparent 1px),
                  linear-gradient(90deg, rgba(170, 155, 135, 0.3) 1px, transparent 1px),
                  radial-gradient(rgba(150, 135, 115, 0.2) 1px, transparent 1px);
                background-size: 50px 50px, 50px 50px, 10px 10px;
                background-position: -1px -1px, -1px -1px, 0 0;
                padding: 30px 20px;
                color: #2c2a26;
              }
              
              .container { max-width: 1400px; margin: 0 auto; position: relative; }
              
              header {
                text-align: center; margin-bottom: 50px;
                padding-bottom: 25px; border-bottom: 3px double #bdab92;
                position: relative;
              }
              
              h1 {
                font-family: 'Bricolage Grotesque', sans-serif;
                font-size: 4rem; font-weight: 700;
                color: #4a3424; /* Deep oxidized copper / leather */
                letter-spacing: -0.02em; margin-bottom: 5px;
                text-shadow: 1px 1px 0px rgba(255,255,255,0.4);
              }
              
              .subhead {
                font-family: 'Zalando Sans', sans-serif;
                font-weight: 400; font-style: italic;
                color: #6a5a4a; font-size: 1.1rem; letter-spacing: 0.5px;
              }
              
              .album {
                background: rgba(248, 245, 238, 0.7);
                border: 1px solid #c8b9a1; border-radius: 2px;
                padding: 35px; margin-bottom: 45px;
                box-shadow: inset 0 0 40px rgba(210, 195, 175, 0.15), 0 5px 15px rgba(0,0,0,0.03);
                position: relative;
              }
              /* Field drawing corner brackets for the high-tech/botanist feel */
              .album::before {
                content: ''; position: absolute;
                top: 5px; left: 5px; right: 5px; bottom: 5px;
                border: 1px solid rgba(150, 135, 115, 0.15); pointer-events: none;
              }
              
              .album h2 {
                font-family: 'Bricolage Grotesque', sans-serif;
                font-size: 2.5rem; font-weight: 600; color: #3a2a1c;
                margin-bottom: 8px; letter-spacing: -0.01em;
              }
              
              .album-meta {
                font-family: 'Zalando Sans', sans-serif; font-size: 0.75rem;
                text-transform: uppercase; letter-spacing: 2px;
                color: #8b7964; margin-bottom: 25px; padding-bottom: 12px;
                border-bottom: 1px dashed #bdab92;
              }
              
              .gallery-grid {
                display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 30px;
              }
              
              .gallery-item {
                background: #fdfcfa;
                /* The pencil box / drafting border style */
                border: 1px solid #7a6d59;
                padding: 8px;
                cursor: pointer; transition: all 0.25s ease;
                position: relative;
                box-shadow: 2px 2px 6px rgba(0,0,0,0.04);
              }
              .gallery-item::after {
                content: ''; position: absolute;
                top: -4px; left: -4px; right: -4px; bottom: -4px;
                border: 1px dashed rgba(122, 109, 89, 0.4);
                pointer-events: none; transition: all 0.25s ease;
              }
              
              .gallery-item:hover {
                transform: translateY(-2px);
                box-shadow: 4px 6px 12px rgba(0,0,0,0.08);
                border-color: #3a2a1c;
              }
              .gallery-item:hover::after {
                border-color: #8b6b4a;
              }
              
              .gallery-item img, .gallery-item video {
                width: 100%; height: 210px; object-fit: cover;
                display: block; background: #e0d5c1;
                /* Slight sepia warmth */
                filter: sepia(0.15) contrast(1.05);
              }
              .gallery-item:hover img, .gallery-item:hover video {
                filter: sepia(0) contrast(1.1);
              }
              
              .gallery-item video { pointer-events: none; }
              
              .gallery-item-caption {
                padding: 14px 4px 4px 4px; line-height: 1.4;
                border-top: none; /* Flow directly like a sketch label */
              }
              
              .caption-title {
                font-family: 'Bricolage Grotesque', sans-serif;
                font-weight: 600; font-size: 0.95rem; color: #3a2a1c;
                margin-bottom: 4px;
              }
              
              .caption-text {
                font-family: 'Zalando Sans', sans-serif; font-size: 0.8rem;
                color: #5a4b3d; letter-spacing: 0.2px; font-weight: 500;
              }
              
              .empty-album {
                background: rgba(250,248,242,0.5); padding: 50px; text-align: center;
                color: #9a8a75; border: 1px dashed #c8b9a1; font-size: 0.9rem;
              }
              
              /* Lightbox Styles - Workbench/Lab view */
              .lightbox {
                display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
                background: rgba(22, 20, 18, 0.96); z-index: 10000;
                justify-content: center; align-items: center; cursor: pointer;
                /* Subtle blueprint grid overlay in lightbox background */
                background-image: linear-gradient(rgba(100,140,160,0.05) 1px, transparent 1px), linear-gradient(90deg, rgba(100,140,160,0.05) 1px, transparent 1px);
                background-size: 40px 40px;
              }
              
              .lightbox-container {
                display: flex; flex-direction: row; width: 90vw; max-width: 1400px; height: 85vh;
                background: #f4efe6; border-radius: 2px; overflow: hidden; cursor: default;
                box-shadow: 0 25px 45px rgba(0,0,0,0.5);
                border: 1px solid #7a6d59;
              }
              
              .lightbox-image-area {
                flex: 1; display: flex; justify-content: center; align-items: center;
                background: #eaddcb; padding: 20px; min-width: 0;
                position: relative;
              }
              .lightbox-image-area::before {
                content: ''; position: absolute; top: 10px; left: 10px; right: 10px; bottom: 10px;
                border: 1px solid rgba(130, 115, 95, 0.2); pointer-events: none;
              }
              
              .lightbox-media {
                max-width: 100%; max-height: 100%; object-fit: contain;
                box-shadow: 0 4px 15px rgba(0,0,0,0.1); border: 2px solid #fdfcfa;
              }
              
              .lightbox-text-area {
                width: 40%; min-width: 280px; max-width: 500px;
                background: #fdfcfa; display: flex; flex-direction: column; overflow: hidden;
                border-left: 2px solid #bdab92;
              }
              
              .lightbox-text-header {
                padding: 24px 24px 16px 24px; border-bottom: 1px solid #bdab92;
                background: #f6f3eb;
              }
              
              .lightbox-text-header h3 {
                font-family: 'Bricolage Grotesque', sans-serif; font-size: 1.6rem; font-weight: 600;
                color: #3a2a1c; margin-bottom: 8px; letter-spacing: -0.01em;
              }
              
              .lightbox-text-header .filename {
                font-family: monospace; font-size: 0.75rem; color: #4a5c60; /* blueprint spec blue */
                background: #e0e4e6; padding: 4px 10px; border-radius: 2px;
                display: inline-block; word-break: break-all; border: 1px solid #bdc5c7;
                letter-spacing: 1px;
              }
              
              .lightbox-caption {
                flex: 1; overflow-y: auto; padding: 20px 24px;
                font-family: 'Zalando Sans', sans-serif; font-size: 0.95rem; line-height: 1.7; color: #3a2a1c;
              }
              
              /* Custom scrollbar - Drafting Brass */
              .lightbox-caption::-webkit-scrollbar { width: 8px; }
              .lightbox-caption::-webkit-scrollbar-track { background: #efebe1; border-left: 1px solid #e0d5c1; }
              .lightbox-caption::-webkit-scrollbar-thumb { background: #bda582; border-radius: 0; }
              .lightbox-caption::-webkit-scrollbar-thumb:hover { background: #968366; }
              
              .lightbox-caption a {
                color: #7b4c3a; /* faded red/copper for links */
                text-decoration: underline; text-decoration-thickness: 1px; text-underline-offset: 3px;
              }
              .lightbox-caption a:hover { color: #8c2b1a; text-decoration-style: dashed; }
              
              .close-hint {
                position: fixed; top: 20px; right: 30px; font-family: monospace; font-size: 0.85rem;
                color: #cca; background: transparent; padding: 8px 16px; border: 1px solid #cca;
                cursor: pointer; z-index: 10001; transition: 0.2s; letter-spacing: 1px;
                text-transform: uppercase;
              }
              .close-hint:hover { background: #cca; color: #161412; }
              
              footer {
                text-align: center; margin-top: 50px; padding-top: 25px; border-top: 1px solid #c8b9a1;
                font-size: 0.8rem; color: #7a6d59; font-weight: 500;
                padding-bottom: 20px;
              }
              footer a { color: #6b523f; text-decoration: none; border-bottom: 1px dotted #6b523f; }
              footer a:hover { color: #2c1a0c; border-bottom-style: solid; }
              
              @media (max-width: 800px) {
                .lightbox-container { flex-direction: column; width: 95vw; height: 90vh; }
                .lightbox-text-area { width: 100%; max-width: none; height: 40%; min-height: 200px; border-left: none; border-top: 2px solid #bdab92; }
                .lightbox-image-area { height: 60%; }
                h1 { font-size: 3rem; } .album h2 { font-size: 2rem; }
              }
              
              @media (max-width: 700px) {
                body { padding: 15px; } .album { padding: 20px; }
                .gallery-grid { grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; }
                .gallery-item img, .gallery-item video { height: 160px; }
              }
            </style>
          </head>
          <body>
            <div class="container">
              <header>
                <h1>🐦 Hummingbird in Paper</h1>
                <div class="subhead">A field notebook tracing the intersection of traditional papercraft, 3D printing, AI, and Blender automation.</div>
              </header>
              
              <div id="gallery-container"></div>
              
              <footer>
                📜 <a href="https://github.com/NatalieC001/Hummingbird-in-Paper" target="_blank">Hummingbird in Paper</a> — a hybrid inventor's notebook documenting a multi-disciplinary tech and art journey.
              </footer>
            </div>
            
            <div id="lightbox" class="lightbox" onclick="closeLightbox()">
              <div class="close-hint" onclick="closeLightbox()">✕ Close (Esc)</div>
              <div class="lightbox-container" onclick="event.stopPropagation()">
                <div class="lightbox-image-area">
                  <img id="lightbox-image" class="lightbox-media" style="display:none;">
                  <video id="lightbox-video" class="lightbox-media" controls style="display:none;"></video>
                </div>
                <div class="lightbox-text-area">
                  <div class="lightbox-text-header">
                    <h3>In her own words</h3>
                    <div class="filename" id="lightbox-filename"></div>
                  </div>
                  <div id="lightbox-caption" class="lightbox-caption"></div>
                </div>
              </div>
            </div>
            
            <script>
              const GITHUB_USER = 'NatalieC001';
              const GITHUB_REPO = 'Hummingbird-in-Paper';
              const BRANCH = 'main';
              const BASE_RAW = `https://raw.githubusercontent.com/${GITHUB_USER}/${GITHUB_REPO}/${BRANCH}/gallery/`;
              const API_BASE = `https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/gallery`;
              
              const container = document.getElementById('gallery-container');
              const lightbox = document.getElementById('lightbox');
              const lightboxImg = document.getElementById('lightbox-image');
              const lightboxVideo = document.getElementById('lightbox-video');
              const lightboxCaption = document.getElementById('lightbox-caption');
              const lightboxFilename = document.getElementById('lightbox-filename');
              
              function openLightbox(url, isVideo, description, filename) {
                lightboxCaption.innerHTML = description || 'No description available';
                lightboxFilename.textContent = filename || '';
                
                if (isVideo) {
                  lightboxImg.style.display = 'none';
                  lightboxVideo.style.display = 'block';
                  lightboxVideo.src = url;
                  lightboxVideo.load();
                  lightboxVideo.play();
                } else {
                  lightboxVideo.style.display = 'none';
                  lightboxVideo.pause();
                  lightboxVideo.src = '';
                  lightboxImg.style.display = 'block';
                  lightboxImg.src = url;
                }
                lightbox.style.display = 'flex';
                document.body.style.overflow = 'hidden';
              }
              
              function closeLightbox() {
                lightbox.style.display = 'none';
                lightboxVideo.pause();
                lightboxVideo.src = '';
                lightboxImg.src = '';
                lightboxCaption.innerHTML = '';
                lightboxFilename.textContent = '';
                document.body.style.overflow = 'auto';
              }
              
              document.addEventListener('keydown', function(e) {
                if (e.key === 'Escape' && lightbox.style.display === 'flex') {
                  closeLightbox();
                }
              });
              
              async function fetchAlbumFolders() {
                try {
                  const response = await fetch(API_BASE);
                  if (!response.ok) {
                    console.error('Could not fetch gallery folders');
                    return [];
                  }
                  const contents = await response.json();
                  const folders = contents.filter(item => item.type === 'dir');
                  return folders.map(folder => folder.name);
                } catch (error) {
                  console.error('Error fetching folders:', error);
                  return [];
                }
              }
              
              let globalDescriptions = {};
              
              async function fetchDescriptions() {
                try {
                  const descUrl = `${BASE_RAW}descriptions.txt`;
                  const response = await fetch(descUrl);
                  if (!response.ok) return;
                  
                  const text = await response.text();
                  text.split('\n').forEach(line => {
                    const colonIndex = line.indexOf(':');
                    if (colonIndex > 0) {
                      const filename = line.substring(0, colonIndex).trim();
                      const description = line.substring(colonIndex + 1).trim();
                      if (filename && description) {
                        globalDescriptions[filename] = description;
                      }
                    }
                  });
                } catch (error) {
                  console.error('Could not fetch descriptions', error);
                }
              }
              
              async function fetchMediaInFolder(folderName) {
                try {
                  const response = await fetch(`${API_BASE}/${folderName}`);
                  
                  if (!response.ok) return [];
                  const contents = await response.json();
                  
                  const imageExtensions = ['jpg', 'jpeg', 'png', 'gif', 'webp'];
                  const videoExtensions = ['mp4', 'mov', 'MP4', 'MOV'];
                  const allExtensions = [...imageExtensions, ...videoExtensions];
                  
                  const media = contents.filter(item => {
                    if (item.type !== 'file') return false;
                    const ext = item.name.split('.').pop();
                    return allExtensions.includes(ext);
                  });
                  
                  return media.map(item => {
                    const ext = item.name.split('.').pop();
                    const isVideo = videoExtensions.includes(ext);
                    return {
                      name: item.name,
                      url: `${BASE_RAW}${folderName}/${item.name}`,
                      downloadUrl: item.download_url,
                      isVideo: isVideo,
                      description: globalDescriptions[item.name] || ''
                    };
                  });
                } catch (error) {
                  console.error(`Error fetching media from ${folderName}:`, error);
                  return [];
                }
              }
              
              function getFolderDisplayName(folderName) {
                const nameMap = {
                  'reference_images': '📸 Reference & Anatomy Studies',
                  'materials': '🎨 Materials & Painting Tests',
                  'paper_cutting': '✂️ Templates & Tracings',
                  'blender_plugin': '🧩 Blender Plugin',
                  'progress_photos': '📸 Progress & Discoveries',
                  'failures': '💥 Studies in What Falls Away',
                  'armature': '🔧 The Armature Beneath',
                  'paper_tests': '📄 On Paper & Patience',
                  'templates': '✂️ Templates & Tracings',
                  'inspirations': '✨ Artists Who Guide the Hand',
                  'discoveries': '💡 Moments of Clarity',
                  'solutions': '✅ What Took Flight'
                };
                return nameMap[folderName] || `📔 ${folderName.replace(/_/g, ' ')}`;
              }
              
              async function buildGallery() {
                container.innerHTML = '<div style="text-align:center; padding:60px; font-family: Zalando Sans, sans-serif;">Loading field notes...</div>';
                
                await fetchDescriptions();
                const folders = await fetchAlbumFolders();
                
                if (folders.length === 0) {
                  container.innerHTML = `
                    <div class="empty-album" style="margin: 60px auto; max-width: 600px;">
                      <p>📭 No albums yet — like a new notebook, waiting for sketches.</p>
                      <p style="margin-top: 20px; font-size: 0.8rem;">Add folders inside <code style="background:#e8e0d4; padding:2px 6px; border-radius:4px;">gallery/</code> with images and a description.txt</p>
                    </div>
                  `;
                  return;
                }
                
                container.innerHTML = '';
                
                for (const folder of folders) {
                  const mediaItems = await fetchMediaInFolder(folder);
                  
                  const albumDiv = document.createElement('div');
                  albumDiv.className = 'album';
                  
                  const imageCount = mediaItems.filter(m => !m.isVideo).length;
                  const videoCount = mediaItems.filter(m => m.isVideo).length;
                  
                  let countText = `${mediaItems.length} ${mediaItems.length === 1 ? 'entry' : 'entries'}`;
                  if (imageCount > 0 && videoCount > 0) {
                    countText = `${imageCount} photograph${imageCount !== 1 ? 's' : ''} + ${videoCount} video${videoCount !== 1 ? 's' : ''}`;
                  } else if (videoCount > 0) {
                    countText = `${videoCount} video${videoCount !== 1 ? 's' : ''}`;
                  } else {
                    countText = `${imageCount} image${imageCount !== 1 ? 's' : ''}`;
                  }
                  
                  const title = getFolderDisplayName(folder);
                  albumDiv.innerHTML = `
                    <h2>${title}</h2>
                    <div class="album-meta">${countText}</div>
                    <div class="gallery-grid" id="grid-${folder.replace(/[^a-zA-Z0-9]/g, '-')}"></div>
                  `;
                  
                  container.appendChild(albumDiv);
                  
                  const gridContainer = albumDiv.querySelector('.gallery-grid');
                  
                  if (mediaItems.length === 0) {
                    gridContainer.innerHTML = '<div class="empty-album" style="grid-column:1/-1;">🍂 No media in this folder yet — waiting for your next experiment.</div>';
                  } else {
                    mediaItems.forEach(media => {
                      const item = document.createElement('div');
                      item.className = 'gallery-item';
                      item.onclick = () => openLightbox(media.url, media.isVideo, media.description, media.name);
                      
                      if (media.isVideo) {
                        const video = document.createElement('video');
                        video.src = media.url;
                        video.muted = true;
                        video.preload = 'metadata';
                        video.onmouseenter = function() { this.play(); };
                        video.onmouseleave = function() { this.pause(); this.currentTime = 0; };
                        item.appendChild(video);
                      } else {
                        const img = document.createElement('img');
                        img.src = media.url;
                        img.alt = media.name;
                        img.loading = 'lazy';
                        img.onerror = function() {
                          this.style.opacity = '0.5';
                          this.style.backgroundColor = '#e8e0d4';
                        };
                        item.appendChild(img);
                      }
                      
                      const caption = document.createElement('div');
                      caption.className = 'gallery-item-caption';
                      
                      const fileName = media.name.replace(/\.[^/.]+$/, '');
                      const displayName = fileName.length > 35 ? fileName.substring(0, 32) + '...' : fileName;
                      
                      const plainTextDescription = media.description.replace(/<[^>]*>/g, '');
                      
                      if (media.description) {
                        caption.innerHTML = `
                          <div class="caption-title">${displayName}</div>
                          <div class="caption-text">${plainTextDescription.length > 80 ? plainTextDescription.substring(0, 77) + '...' : plainTextDescription}</div>
                        `;
                      } else {
                        caption.innerHTML = `
                          <div class="caption-title">${media.isVideo ? 'Moving image' : 'Study page'}</div>
                          <div class="caption-text">Click to read the notes</div>
                        `;
                      }
                      
                      item.appendChild(caption);
                      gridContainer.appendChild(item);
                    });
                  }
                }
              }
              
              buildGallery();
            </script>
          </body>
          </html>
          EOF
          
          echo "Gallery HTML file created successfully at _site/index.html"

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
          
