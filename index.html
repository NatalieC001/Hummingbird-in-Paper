<!DOCTYPE html>
<html>
<head><title>Hummingbird in Paper - Gallery</title>
<style>
  body { font-family: sans-serif; max-width: 1200px; margin: 0 auto; padding: 20px; background: #f5f5f0; }
  h1 { color: #2c3e2f; border-bottom: 2px solid #8b7355; padding-bottom: 10px; }
  .album { background: white; margin: 20px 0; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
  .album h2 { margin-top: 0; color: #5a4a3a; }
  .thumbnails { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; margin-top: 15px; }
  .thumb { text-align: center; }
  .thumb img { width: 100%; height: 150px; object-fit: cover; border-radius: 5px; cursor: pointer; border: 1px solid #ddd; }
  .thumb img:hover { transform: scale(1.02); transition: 0.2s; }
  .lightbox { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; cursor: pointer; }
  .lightbox img { max-width: 90%; max-height: 90%; margin: auto; position: absolute; top: 0; bottom: 0; left: 0; right: 0; border: 3px solid white; }
  .footer { text-align: center; margin-top: 40px; color: #8b7355; font-size: 0.9em; }
</style>
</head>
<body>
<h1>🐦 Hummingbird in Paper - Process Gallery</h1>
<p>Click any image to enlarge. Photos load as I add them to the gallery folder.</p>

<div id="albums"></div>
<div class="footer">From the <a href="https://github.com/NatalieC001/Hummingbird-in-Paper">Hummingbird in Paper</a> diary</div>

<div id="lightbox" class="lightbox" onclick="this.style.display='none'">
  <img id="lightbox-img">
</div>

<script>
  const albums = {};
  const basePath = 'https://raw.githubusercontent.com/NatalieC001/Hummingbird-in-Paper/main/gallery/';
  EOF

# Find all subfolders in gallery/ and generate album list
find gallery -mindepth 1 -maxdepth 1 -type d | while read album; do
  album_name=$(basename "$album")
  echo "albums['$album_name'] = []" >> _site/index.html
  find "$album" -type f \( -iname "*.jpg" -o -iname "*.jpeg" -o -iname "*.png" -o -iname "*.gif" \) | while read img; do
    img_rel=$(echo "$img" | sed 's/gallery\///')
    echo "albums['$album_name'].push('$img_rel')" >> _site/index.html
  done
done

cat >> _site/index.html << 'EOF'

const container = document.getElementById('albums');
for (const [album, images] of Object.entries(albums)) {
  const albumDiv = document.createElement('div');
  albumDiv.className = 'album';
  albumDiv.innerHTML = `<h2>📁 ${album.replace(/_/g, ' ')} (${images.length} photos)</h2><div class="thumbnails" id="album-${album}"></div>`;
  container.appendChild(albumDiv);

  const thumbContainer = document.getElementById(`album-${album}`);
  images.forEach(img => {
    const thumb = document.createElement('div');
    thumb.className = 'thumb';
    thumb.innerHTML = `<img src="${basePath}${img}" onclick="document.getElementById('lightbox-img').src='${basePath}${img}';document.getElementById('lightbox').style.display='flex'">`;
    thumbContainer.appendChild(thumb);
  });
}
</script>
</body>
</html>
