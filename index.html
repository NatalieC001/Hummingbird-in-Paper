<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hummingbird in Paper - Process Gallery</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
      background: #f5f0e8;
      padding: 30px 20px;
      color: #2c2820;
    }
    
    .container {
      max-width: 1400px;
      margin: 0 auto;
    }
    
    header {
      text-align: center;
      margin-bottom: 50px;
    }
    
    h1 {
      font-size: 2.5rem;
      color: #2d5a2c;
      font-weight: 500;
      letter-spacing: -0.5px;
    }
    
    .subhead {
      color: #7a6b55;
      font-size: 1.1rem;
      margin-top: 10px;
      font-style: italic;
    }
    
    .album {
      background: white;
      border-radius: 20px;
      padding: 30px;
      margin-bottom: 40px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.05);
      border: 1px solid #e2d8cc;
    }
    
    .album h2 {
      font-size: 1.8rem;
      font-weight: 500;
      color: #4a3e2c;
      margin-bottom: 8px;
    }
    
    .album-meta {
      color: #9b8b74;
      font-size: 0.85rem;
      margin-bottom: 25px;
      padding-bottom: 15px;
      border-bottom: 2px solid #efe5d8;
    }
    
    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 25px;
    }
    
    .gallery-item {
      background: #faf8f4;
      border-radius: 12px;
      overflow: hidden;
      cursor: pointer;
      transition: all 0.25s ease;
      border: 1px solid #e8dfd3;
    }
    
    .gallery-item:hover {
      transform: translateY(-5px);
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
      border-color: #c4b49c;
    }
    
    .gallery-item img, .gallery-item video {
      width: 100%;
      height: 200px;
      object-fit: cover;
      display: block;
      background: #e8e0d4;
    }
    
    .gallery-item video {
      pointer-events: none;
    }
    
    .gallery-item-caption {
      padding: 12px;
      font-size: 0.85rem;
      color: #4a3e2c;
      background: white;
      border-top: 1px solid #efe5d8;
      line-height: 1.4;
    }
    
    .caption-title {
      font-weight: 600;
      color: #2d5a2c;
      margin-bottom: 5px;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    
    .caption-text {
      font-size: 0.85rem;
      color: #6b5d4b;
    }
    
    .empty-album {
      background: #faf8f4;
      padding: 50px;
      text-align: center;
      color: #b8a88c;
      border-radius: 16px;
      border: 2px dashed #e2d8cc;
      font-size: 1rem;
    }
    
    .lightbox {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.95);
      z-index: 10000;
      justify-content: center;
      align-items: center;
      cursor: pointer;
      flex-direction: column;
    }
    
    .lightbox-media {
      max-width: 90%;
      max-height: 70vh;
      object-fit: contain;
      border-radius: 8px;
      box-shadow: 0 0 40px rgba(0,0,0,0.3);
    }
    
    .lightbox-caption {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.85);
      color: white;
      padding: 15px 25px;
      border-radius: 12px;
      max-width: 80%;
      text-align: center;
      font-size: 1rem;
      line-height: 1.5;
      pointer-events: none;
      z-index: 10001;
    }
    
    .close-hint {
      position: fixed;
      top: 25px;
      right: 25px;
      color: rgba(255,255,255,0.7);
      background: rgba(0,0,0,0.5);
      padding: 8px 18px;
      border-radius: 40px;
      font-size: 0.8rem;
      pointer-events: none;
      font-family: monospace;
    }
    
    footer {
      text-align: center;
      margin-top: 50px;
      padding-top: 30px;
      border-top: 1px solid #e2d8cc;
      color: #9b8b74;
    }
    
    footer a {
      color: #5d7a4c;
      text-decoration: none;
    }
    
    footer a:hover {
      text-decoration: underline;
    }
    
    @media (max-width: 700px) {
      body { padding: 15px; }
      .album { padding: 20px; }
      h1 { font-size: 1.8rem; }
      .album h2 { font-size: 1.4rem; }
      .gallery-grid { grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; }
      .gallery-item img, .gallery-item video { height: 150px; }
      .lightbox-caption { font-size: 0.85rem; padding: 10px 20px; bottom: 20px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>🐦 Hummingbird in Paper</h1>
      <div class="subhead">Process diary — progress, failures, discoveries, and solutions</div>
    </header>
    
    <div id="gallery-container"></div>
    
    <footer>
      📔 <a href="https://github.com/NatalieC001/Hummingbird-in-Paper" target="_blank">Hummingbird in Paper</a> — a diary. No downloads. Just the process.
    </footer>
  </div>
  
  <div id="lightbox" class="lightbox" onclick="closeLightbox()">
    <div class="close-hint">Click anywhere to close — ✕</div>
    <img id="lightbox-image" class="lightbox-media" style="display:none;">
    <video id="lightbox-video" class="lightbox-media" controls style="display:none;"></video>
    <div id="lightbox-caption" class="lightbox-caption"></div>
  </div>
  
  <script>
    const GITHUB_USER = 'NatalieC001';
    const GITHUB_REPO = 'Hummingbird-in-Paper';
    const BRANCH = 'main';
    const BASE_RAW = `https://raw.githubusercontent.com/${GITHUB_USER}/${GITHUB_REPO}/${BRANCH}/gallery/`;
    const API_BASE = `https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/gallery`;
    
    const container = document.getElementById('gallery-container');
    const lightbox = document.getElementById('lightbox');
    const lightboxImg = document.getElementById('lightbox-image');
    const lightboxVideo = document.getElementById('lightbox-video');
    const lightboxCaption = document.getElementById('lightbox-caption');
    
    function openLightbox(url, isVideo, description) {
      lightboxCaption.innerHTML = description || 'No description available';
      
      if (isVideo) {
        lightboxImg.style.display = 'none';
        lightboxVideo.style.display = 'block';
        lightboxVideo.src = url;
        lightboxVideo.load();
        lightboxVideo.play();
      } else {
        lightboxVideo.style.display = 'none';
        lightboxVideo.pause();
        lightboxVideo.src = '';
        lightboxImg.style.display = 'block';
        lightboxImg.src = url;
      }
      lightbox.style.display = 'flex';
      document.body.style.overflow = 'hidden';
    }
    
    function closeLightbox() {
      lightbox.style.display = 'none';
      lightboxVideo.pause();
      lightboxVideo.src = '';
      lightboxImg.src = '';
      lightboxCaption.innerHTML = '';
      document.body.style.overflow = 'auto';
    }
    
    async function fetchAlbumFolders() {
      try {
        const response = await fetch(API_BASE);
        if (!response.ok) {
          console.error('Could not fetch gallery folders');
          return [];
        }
        const contents = await response.json();
        const folders = contents.filter(item => item.type === 'dir');
        return folders.map(folder => folder.name);
      } catch (error) {
        console.error('Error fetching folders:', error);
        return [];
      }
    }
    
    async function fetchDescriptions(folderName) {
      try {
        const descUrl = `${BASE_RAW}${folderName}/description.txt`;
        const response = await fetch(descUrl);
        if (!response.ok) return {};
        
        const text = await response.text();
        const descriptions = {};
        text.split('\n').forEach(line => {
          const colonIndex = line.indexOf(':');
          if (colonIndex > 0) {
            const filename = line.substring(0, colonIndex).trim();
            const description = line.substring(colonIndex + 1).trim();
            if (filename && description) {
              descriptions[filename] = description;
            }
          }
        });
        return descriptions;
      } catch (error) {
        return {};
      }
    }
    
    async function fetchMediaInFolder(folderName) {
      try {
        const [response, descriptions] = await Promise.all([
          fetch(`${API_BASE}/${folderName}`),
          fetchDescriptions(folderName)
        ]);
        
        if (!response.ok) return [];
        const contents = await response.json();
        
        const imageExtensions = ['jpg', 'jpeg', 'png', 'gif', 'webp'];
        const videoExtensions = ['mp4', 'mov', 'MP4', 'MOV'];
        const allExtensions = [...imageExtensions, ...videoExtensions];
        
        const media = contents.filter(item => {
          if (item.type !== 'file') return false;
          const ext = item.name.split('.').pop();
          return allExtensions.includes(ext);
        });
        
        return media.map(item => {
          const ext = item.name.split('.').pop();
          const isVideo = videoExtensions.includes(ext);
          return {
            name: item.name,
            url: `${BASE_RAW}${folderName}/${item.name}`,
            downloadUrl: item.download_url,
            isVideo: isVideo,
            description: descriptions[item.name] || ''
          };
        });
      } catch (error) {
        console.error(`Error fetching media from ${folderName}:`, error);
        return [];
      }
    }
    
    function getFolderDisplayName(folderName) {
      const nameMap = {
        'progress_photos': '📸 Progress Photos',
        'failures': '💥 Failures & What Went Wrong',
        'armature': '🔧 Armature & JointForge',
        'paper_tests': '📄 Paper Cutting Tests',
        'templates': '✂️ Cutting Templates',
        'inspirations': '✨ Artists Who Inspire Me',
        'discoveries': '💡 Discoveries Along the Way',
        'solutions': '✅ Solutions That Worked'
      };
      return nameMap[folderName] || `📁 ${folderName.replace(/_/g, ' ')}`;
    }
    
    async function buildGallery() {
      container.innerHTML = '<div style="text-align:center; padding:60px;">Loading gallery...</div>';
      
      const folders = await fetchAlbumFolders();
      
      if (folders.length === 0) {
        container.innerHTML = `
          <div class="empty-album" style="margin: 60px auto; max-width: 600px;">
            <p>📭 No photo albums found yet.</p>
            <p style="margin-top: 20px; font-size: 0.9rem;">Create folders inside <code style="background:#e8e0d4; padding:2px 6px; border-radius:4px;">gallery/</code> and add your photos or videos.</p>
            <p style="margin-top: 10px; font-size: 0.85rem;">Example: <code style="background:#e8e0d4; padding:2px 6px; border-radius:4px;">gallery/progress_photos/photo1.jpg</code></p>
          </div>
        `;
        return;
      }
      
      container.innerHTML = '';
      
      for (const folder of folders) {
        const mediaItems = await fetchMediaInFolder(folder);
        
        const albumDiv = document.createElement('div');
        albumDiv.className = 'album';
        
        const imageCount = mediaItems.filter(m => !m.isVideo).length;
        const videoCount = mediaItems.filter(m => m.isVideo).length;
        
        let countText = `${mediaItems.length} ${mediaItems.length === 1 ? 'item' : 'items'}`;
        if (imageCount > 0 && videoCount > 0) {
          countText = `${imageCount} photo${imageCount !== 1 ? 's' : ''} + ${videoCount} video${videoCount !== 1 ? 's' : ''}`;
        } else if (videoCount > 0) {
          countText = `${videoCount} video${videoCount !== 1 ? 's' : ''}`;
        } else {
          countText = `${imageCount} photo${imageCount !== 1 ? 's' : ''}`;
        }
        
        const title = getFolderDisplayName(folder);
        albumDiv.innerHTML = `
          <h2>${title}</h2>
          <div class="album-meta">${countText}</div>
          <div class="gallery-grid" id="grid-${folder.replace(/[^a-zA-Z0-9]/g, '-')}"></div>
        `;
        
        container.appendChild(albumDiv);
        
        const gridContainer = albumDiv.querySelector('.gallery-grid');
        
        if (mediaItems.length === 0) {
          gridContainer.innerHTML = '<div class="empty-album" style="grid-column:1/-1;">📭 No media in this album yet</div>';
        } else {
          mediaItems.forEach(media => {
            const item = document.createElement('div');
            item.className = 'gallery-item';
            item.onclick = () => openLightbox(media.url, media.isVideo, media.description);
            
            if (media.isVideo) {
              const video = document.createElement('video');
              video.src = media.url;
              video.muted = true;
              video.preload = 'metadata';
              video.onmouseenter = function() { this.play(); };
              video.onmouseleave = function() { this.pause(); this.currentTime = 0; };
              item.appendChild(video);
            } else {
              const img = document.createElement('img');
              img.src = media.url;
              img.alt = media.name;
              img.loading = 'lazy';
              img.onerror = function() {
                this.style.opacity = '0.3';
                this.style.backgroundColor = '#e8e0d4';
              };
              item.appendChild(img);
            }
            
            const caption = document.createElement('div');
            caption.className = 'gallery-item-caption';
            
            const fileName = media.name.replace(/\.[^/.]+$/, '');
            const displayName = fileName.length > 35 ? fileName.substring(0, 32) + '...' : fileName;
            
            // Strip HTML tags for grid preview to keep it clean
            const plainTextDescription = media.description.replace(/<[^>]*>/g, '');
            
            if (media.description) {
              caption.innerHTML = `
                <div class="caption-title">📝 ${displayName}</div>
                <div class="caption-text">${plainTextDescription.length > 80 ? plainTextDescription.substring(0, 77) + '...' : plainTextDescription}</div>
              `;
            } else {
              caption.innerHTML = `
                <div class="caption-title">${media.isVideo ? '🎬' : '🖼️'} ${displayName}</div>
                <div class="caption-text">Click to view</div>
              `;
            }
            
            item.appendChild(caption);
            gridContainer.appendChild(item);
          });
        }
      }
    }
    
    buildGallery();
  </script>
</body>
</html>
