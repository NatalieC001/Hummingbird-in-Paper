<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hummingbird in Paper - Process Gallery</title>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,300;12..96,400;12..96,500;12..96,600;12..96,700&family=Zalando+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'Zalando Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
      background-color: #eaddcb;
      background-image: 
        linear-gradient(rgba(170, 155, 135, 0.3) 1px, transparent 1px),
        linear-gradient(90deg, rgba(170, 155, 135, 0.3) 1px, transparent 1px),
        radial-gradient(rgba(150, 135, 115, 0.2) 1px, transparent 1px);
      background-size: 50px 50px, 50px 50px, 10px 10px;
      background-position: -1px -1px, -1px -1px, 0 0;
      padding: 30px 20px;
      color: #2c2a26;
    }
    
    .container { max-width: 1400px; margin: 0 auto; position: relative; }
    
    header {
      text-align: center; margin-bottom: 50px;
      padding-bottom: 25px; border-bottom: 3px double #bdab92;
      position: relative;
    }
    
    h1 {
      font-family: 'Bricolage Grotesque', sans-serif;
      font-size: 4rem; font-weight: 700;
      color: #4a3424;
      letter-spacing: -0.02em; margin-bottom: 5px;
      text-shadow: 1px 1px 0px rgba(255,255,255,0.4);
    }
    
    .subhead {
      font-family: 'Zalando Sans', sans-serif;
      font-weight: 400; font-style: italic;
      color: #6a5a4a; font-size: 1.1rem; letter-spacing: 0.5px;
    }
    
    .album {
      background: rgba(248, 245, 238, 0.7);
      border: 1px solid #c8b9a1; border-radius: 2px;
      padding: 35px; margin-bottom: 45px;
      box-shadow: inset 0 0 40px rgba(210, 195, 175, 0.15), 0 5px 15px rgba(0,0,0,0.03);
      position: relative;
    }
    .album::before {
      content: ''; position: absolute;
      top: 5px; left: 5px; right: 5px; bottom: 5px;
      border: 1px solid rgba(150, 135, 115, 0.15); pointer-events: none;
    }
    
    .album h2 {
      font-family: 'Bricolage Grotesque', sans-serif;
      font-size: 2.5rem; font-weight: 600; color: #3a2a1c;
      margin-bottom: 8px; letter-spacing: -0.01em;
    }
    
    .gallery-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 30px;
    }
    
    .gallery-item {
      background: #fdfcfa;
      border: 1px solid #7a6d59;
      padding: 8px;
      cursor: pointer; transition: all 0.25s ease;
      position: relative;
      box-shadow: 2px 2px 6px rgba(0,0,0,0.04);
    }
    .gallery-item::after {
      content: ''; position: absolute;
      top: -4px; left: -4px; right: -4px; bottom: -4px;
      border: 1px dashed rgba(122, 109, 89, 0.4);
      pointer-events: none; transition: all 0.25s ease;
    }
    
    .gallery-item:hover {
      transform: translateY(-2px);
      box-shadow: 4px 6px 12px rgba(0,0,0,0.08);
      border-color: #3a2a1c;
    }
    .gallery-item:hover::after {
      border-color: #8b6b4a;
    }
    
    .gallery-item img, .gallery-item video {
      width: 100%; height: 210px; object-fit: cover;
      display: block; background: #e0d5c1;
      filter: sepia(0.15) contrast(1.05);
    }
    .gallery-item:hover img, .gallery-item:hover video {
      filter: sepia(0) contrast(1.1);
    }
    
    .gallery-item video { pointer-events: none; }
    
    .gallery-item-caption {
      padding: 14px 4px 4px 4px; line-height: 1.4;
    }
    
    .caption-title {
      font-family: 'Bricolage Grotesque', sans-serif;
      font-weight: 600; font-size: 0.95rem; color: #3a2a1c;
      margin-bottom: 4px;
    }
    
    .caption-text {
      font-family: 'Zalando Sans', sans-serif; font-size: 0.8rem;
      color: #5a4b3d; letter-spacing: 0.2px;
    }
    
    .album-description {
      font-family: 'Zalando Sans', sans-serif; font-size: 0.95rem;
      color: #5a4b3d; line-height: 1.5; margin-bottom: 25px;
      padding-bottom: 12px; border-bottom: 1px dashed #c8b9a1;
    }
    
    .empty-album {
      background: rgba(250,248,242,0.5); padding: 50px; text-align: center;
      color: #9a8a75; border: 1px dashed #c8b9a1; font-size: 0.9rem;
    }
    
    .lightbox {
      display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(22, 20, 18, 0.96); z-index: 10000;
      justify-content: center; align-items: center; cursor: pointer;
      background-image: linear-gradient(rgba(100,140,160,0.05) 1px, transparent 1px), linear-gradient(90deg, rgba(100,140,160,0.05) 1px, transparent 1px);
      background-size: 40px 40px;
    }
    
    .lightbox-container {
      display: flex; flex-direction: row; width: 90vw; max-width: 1400px; height: 85vh;
      background: #f4efe6; border-radius: 2px; overflow: hidden; cursor: default;
      box-shadow: 0 25px 45px rgba(0,0,0,0.5);
      border: 1px solid #7a6d59;
    }
    
    .lightbox-image-area {
      flex: 1; display: flex; justify-content: center; align-items: center;
      background: #eaddcb; padding: 20px; min-width: 0;
      position: relative;
    }
    .lightbox-image-area::before {
      content: ''; position: absolute; top: 10px; left: 10px; right: 10px; bottom: 10px;
      border: 1px solid rgba(130, 115, 95, 0.2); pointer-events: none;
    }
    
    .lightbox-media {
      max-width: 100%; max-height: 100%; object-fit: contain;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1); border: 2px solid #fdfcfa;
    }
    
    .lightbox-text-area {
      width: 40%; min-width: 280px; max-width: 500px;
      background: #fdfcfa; display: flex; flex-direction: column; overflow: hidden;
      border-left: 2px solid #bdab92;
    }
    
    .lightbox-text-header {
      padding: 24px 24px 16px 24px; border-bottom: 1px solid #bdab92;
      background: #f6f3eb;
    }
    
    .lightbox-text-header h3 {
      font-family: 'Bricolage Grotesque', sans-serif; font-size: 1.6rem; font-weight: 600;
      color: #3a2a1c; margin-bottom: 8px;
    }
    
    .lightbox-text-header .filename {
      font-family: monospace; font-size: 0.75rem; color: #4a5c60;
      background: #e0e4e6; padding: 4px 10px; border-radius: 2px;
      display: inline-block;
    }
    
    .lightbox-caption {
      flex: 1; overflow-y: auto; padding: 20px 24px;
      font-family: 'Zalando Sans', sans-serif; font-size: 0.95rem; line-height: 1.7;
    }
    
    .lightbox-caption a { color: #7b4c3a; }
    .lightbox-caption a:hover { color: #8c2b1a; }
    
    .close-hint {
      position: fixed; top: 20px; right: 30px; font-family: monospace;
      color: #cca; background: transparent; padding: 8px 16px; border: 1px solid #cca;
      cursor: pointer; z-index: 10001;
    }
    .close-hint:hover { background: #cca; color: #161412; }
    
    footer {
      text-align: center; margin-top: 50px; padding-top: 25px; border-top: 1px solid #c8b9a1;
      font-size: 0.8rem; color: #7a6d59;
    }
    footer a { color: #6b523f; text-decoration: none; }
    
    @media (max-width: 800px) {
      .lightbox-container { flex-direction: column; width: 95vw; height: 90vh; }
      .lightbox-text-area { width: 100%; max-width: none; height: 40%; border-left: none; border-top: 2px solid #bdab92; }
      .lightbox-image-area { height: 60%; }
      h1 { font-size: 3rem; } .album h2 { font-size: 2rem; }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>Hummingbird in Paper</h1>
      <div class="subhead">A field notebook tracing the intersection of traditional papercraft, 3D printing, AI, and Blender automation.</div>
    </header>
    <div id="gallery-container"></div>
    <footer>📜 <a href="https://github.com/NatalieC001/Hummingbird-in-Paper" target="_blank">Hummingbird in Paper</a></footer>
  </div>
  
  <div id="lightbox" class="lightbox" onclick="closeLightbox()">
    <div class="close-hint" onclick="closeLightbox()">✕ Close</div>
    <div class="lightbox-container" onclick="event.stopPropagation()">
      <div class="lightbox-image-area">
        <img id="lightbox-image" class="lightbox-media" style="display:none;">
        <video id="lightbox-video" class="lightbox-media" controls style="display:none;"></video>
      </div>
      <div class="lightbox-text-area">
        <div class="lightbox-text-header">
          <h3>Scribbles and Notes</h3>
          <div class="filename" id="lightbox-filename"></div>
        </div>
        <div id="lightbox-caption" class="lightbox-caption"></div>
      </div>
    </div>
  </div>
  
  <script>
    const GITHUB_USER = 'NatalieC001';
    const GITHUB_REPO = 'Hummingbird-in-Paper';
    const BRANCH = 'main';
    const BASE_RAW = `https://raw.githubusercontent.com/${GITHUB_USER}/${GITHUB_REPO}/${BRANCH}/gallery/`;
    const API_BASE = `https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/gallery`;
    
    const container = document.getElementById('gallery-container');
    const lightbox = document.getElementById('lightbox');
    const lightboxImg = document.getElementById('lightbox-image');
    const lightboxVideo = document.getElementById('lightbox-video');
    const lightboxCaption = document.getElementById('lightbox-caption');
    const lightboxFilename = document.getElementById('lightbox-filename');
    
    function openLightbox(url, isVideo, description, filename) {
      lightboxCaption.innerHTML = description || 'No description available';
      lightboxFilename.textContent = filename || '';
      if (isVideo) {
        lightboxImg.style.display = 'none';
        lightboxVideo.style.display = 'block';
        lightboxVideo.src = url;
        lightboxVideo.load();
        lightboxVideo.play();
      } else {
        lightboxVideo.style.display = 'none';
        lightboxVideo.pause();
        lightboxVideo.src = '';
        lightboxImg.style.display = 'block';
        lightboxImg.src = url;
      }
      lightbox.style.display = 'flex';
      document.body.style.overflow = 'hidden';
    }
    
    function closeLightbox() {
      lightbox.style.display = 'none';
      lightboxVideo.pause();
      lightboxVideo.src = '';
      lightboxImg.src = '';
      lightboxCaption.innerHTML = '';
      lightboxFilename.textContent = '';
      document.body.style.overflow = 'auto';
    }
    
    document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeLightbox(); });
    
    async function fetchAlbumFolders() {
      try {
        const response = await fetch(API_BASE);
        if (!response.ok) return [];
        const contents = await response.json();
        return contents.filter(item => item.type === 'dir').map(folder => folder.name);
      } catch (error) {
        console.error('Error fetching folders:', error);
        return [];
      }
    }
    
    let globalDescriptions = {};
    
    async function fetchDescriptions() {
      try {
        const response = await fetch(`${BASE_RAW}descriptions.txt`);
        if (!response.ok) return;
        const text = await response.text();
        
        // Simple parser: find lines that start with a filename and colon
        const lines = text.split(/\r?\n/);
        let currentKey = null;
        let currentValue = [];
        
        for (let i = 0; i < lines.length; i++) {
          const line = lines[i];
          // Check if line starts with a filename pattern (has . or starts with DIR_)
          const colonIndex = line.indexOf('|'); // split with | not colons which mess up html
          const isNewEntry = colonIndex > 0 && (
            line.substring(0, colonIndex).includes('.') || 
            line.substring(0, colonIndex).startsWith('DIR_')
          );
          
          if (isNewEntry) {
            // Save previous entry
            if (currentKey) {
              globalDescriptions[currentKey] = currentValue.join(' ').trim();
            }
            // Start new entry
            currentKey = line.substring(0, colonIndex).trim();
            currentValue = [line.substring(colonIndex + 1).trim()];
          } else if (currentKey && line.trim()) {
            // Append to current description
            currentValue.push(line.trim());
          }
        }
        // Save last entry
        if (currentKey) {
          globalDescriptions[currentKey] = currentValue.join(' ').trim();
        }
        
        console.log('Loaded', Object.keys(globalDescriptions).length, 'descriptions');
      } catch (error) {
        console.error('Error fetching descriptions:', error);
      }
    }
    
    async function fetchMediaInFolder(folderName) {
      try {
        const response = await fetch(`${API_BASE}/${folderName}`);
        if (!response.ok) return [];
        const contents = await response.json();
        const imageExtensions = ['jpg', 'jpeg', 'png', 'gif', 'webp'];
        const videoExtensions = ['mp4', 'mov'];
        const media = contents.filter(item => {
          if (item.type !== 'file') return false;
          const ext = item.name.split('.').pop().toLowerCase();
          return [...imageExtensions, ...videoExtensions].includes(ext);
        });
        return media.map(item => {
          const ext = item.name.split('.').pop().toLowerCase();
          return {
            name: item.name,
            url: `${BASE_RAW}${folderName}/${item.name}`,
            isVideo: videoExtensions.includes(ext),
            description: globalDescriptions[item.name] || ''
          };
        });
      } catch (error) {
        console.error(`Error fetching media from ${folderName}:`, error);
        return [];
      }
    }
    
    function getFolderDisplayName(folderName) {
      const map = {
        'WorkFlow': 'WorkFlow',
        '3d_modeling': '3D Modeling',
        'blender_plugin': 'Blender Plugin',
        'materials': 'Materials',
        'paper_cutting': 'Paper Cutting',
        'templates': 'Templates',
        'progress_photos': 'Progress Photos',
        'reference_images': 'Reference Images'
      };
      return map[folderName] || folderName;
    }
    
    async function buildGallery() {
      container.innerHTML = '<div style="text-align:center; padding:60px;">Loading...</div>';
      await fetchDescriptions();
      let folders = await fetchAlbumFolders();
      
      if (folders.length === 0) {
        container.innerHTML = '<div class="empty-album">No albums found</div>';
        return;
      }
      
      container.innerHTML = '';
      
      for (const folder of folders) {
        const mediaItems = await fetchMediaInFolder(folder);
        const albumDiv = document.createElement('div');
        albumDiv.className = 'album';
        const folderDesc = globalDescriptions[`DIR_${folder}`] || '';
        albumDiv.innerHTML = `
          <h2>${getFolderDisplayName(folder)}</h2>
          ${folderDesc ? `<div class="album-description">${folderDesc}</div>` : ''}
          <div class="gallery-grid" id="grid-${folder}"></div>
        `;
        container.appendChild(albumDiv);
        const grid = albumDiv.querySelector('.gallery-grid');
        
        if (mediaItems.length === 0) {
          grid.innerHTML = '<div class="empty-album">No images yet</div>';
        } else {
          mediaItems.forEach(media => {
            const item = document.createElement('div');
            item.className = 'gallery-item';
            item.onclick = () => openLightbox(media.url, media.isVideo, media.description, media.name);
            if (media.isVideo) {
              const video = document.createElement('video');
              video.src = media.url;
              video.muted = true;
              video.preload = 'metadata';
              video.onmouseenter = function() { this.play(); };
              video.onmouseleave = function() { this.pause(); this.currentTime = 0; };
              item.appendChild(video);
            } else {
              const img = document.createElement('img');
              img.src = media.url;
              img.alt = media.name;
              img.loading = 'lazy';
              item.appendChild(img);
            }
            const caption = document.createElement('div');
            caption.className = 'gallery-item-caption';
            const plainText = media.description ? media.description.replace(/<[^>]*>/g, '') : '';
            caption.innerHTML = `
              <div class="caption-title">${media.name.replace(/\.[^/.]+$/, '').substring(0, 35)}</div>
              <div class="caption-text">${plainText.substring(0, 80)}${plainText.length > 80 ? '...' : 'Click to read'}</div>
            `;
            item.appendChild(caption);
            grid.appendChild(item);
          });
        }
      }
    }
    
    buildGallery();
  </script>
</body>
</html>
