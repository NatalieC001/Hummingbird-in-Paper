<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hummingbird in Paper - Process Gallery</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f0e8;
      padding: 30px 20px;
      color: #2c2820;
    }
    .container { max-width: 1400px; margin: 0 auto; }
    header { text-align: center; margin-bottom: 50px; }
    h1 { font-size: 2.5rem; color: #2d5a2c; font-weight: 500; }
    .subhead { color: #7a6b55; font-size: 1.1rem; margin-top: 10px; font-style: italic; }
    .album {
      background: white;
      border-radius: 20px;
      padding: 30px;
      margin-bottom: 40px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.05);
      border: 1px solid #e2d8cc;
    }
    .album h2 { font-size: 1.8rem; font-weight: 500; color: #4a3e2c; margin-bottom: 8px; }
    .album-meta { color: #9b8b74; font-size: 0.85rem; margin-bottom: 25px; padding-bottom: 15px; border-bottom: 2px solid #efe5d8; }
    .gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
    .gallery-item {
      background: #faf8f4;
      border-radius: 12px;
      overflow: hidden;
      cursor: pointer;
      transition: all 0.25s ease;
      border: 1px solid #e8dfd3;
    }
    .gallery-item:hover { transform: translateY(-5px); box-shadow: 0 10px 25px rgba(0,0,0,0.1); border-color: #c4b49c; }
    .gallery-item img {
      width: 100%;
      height: 180px;
      object-fit: cover;
      display: block;
      background: #e8e0d4;
    }
    .video-thumb {
      position: relative;
    }
    .video-thumb::after {
      content: "▶";
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 48px;
      color: white;
      background: rgba(0,0,0,0.6);
      width: 60px;
      height: 60px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
    }
    .gallery-item-caption {
      padding: 10px 12px;
      font-size: 0.75rem;
      color: #6b5d4b;
      background: white;
      border-top: 1px solid #efe5d8;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .empty-album {
      background: #faf8f4;
      padding: 50px;
      text-align: center;
      color: #b8a88c;
      border-radius: 16px;
      border: 2px dashed #e2d8cc;
    }
    .lightbox {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.95);
      z-index: 10000;
      justify-content: center;
      align-items: center;
      cursor: pointer;
    }
    .lightbox iframe, .lightbox img {
      max-width: 90%;
      max-height: 90%;
      border-radius: 8px;
      box-shadow: 0 0 40px rgba(0,0,0,0.3);
    }
    .lightbox iframe {
      width: 800px;
      height: 450px;
      background: black;
    }
    .close-hint {
      position: fixed;
      bottom: 25px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255,255,255,0.7);
      background: rgba(0,0,0,0.5);
      padding: 8px 18px;
      border-radius: 40px;
      font-size: 0.8rem;
      pointer-events: none;
    }
    footer {
      text-align: center;
      margin-top: 50px;
      padding-top: 30px;
      border-top: 1px solid #e2d8cc;
      color: #9b8b74;
    }
    footer a { color: #5d7a4c; text-decoration: none; }
    @media (max-width: 700px) {
      body { padding: 15px; }
      .album { padding: 20px; }
      h1 { font-size: 1.8rem; }
      .album h2 { font-size: 1.4rem; }
      .gallery-grid { grid-template-columns: 1fr; }
      .lightbox iframe { width: 95%; height: auto; aspect-ratio: 16/9; }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>🐦 Hummingbird in Paper</h1>
      <div class="subhead">Process diary — progress, failures, discoveries, and solutions</div>
    </header>
    <div id="gallery-container"></div>
    <footer>📔 <a href="https://github.com/NatalieC001/Hummingbird-in-Paper" target="_blank">Hummingbird in Paper</a> — a diary. No downloads. Just the process.</footer>
  </div>

  <div id="lightbox" class="lightbox" onclick="closeLightbox()">
    <iframe id="lightbox-iframe" src="" frameborder="0" allowfullscreen style="display:none;"></iframe>
    <img id="lightbox-image" alt="" style="display:none;">
    <div class="close-hint">Click anywhere to close — ✕</div>
  </div>

  <script>
    const GITHUB_USER = 'NatalieC001';
    const GITHUB_REPO = 'Hummingbird-in-Paper';
    const BRANCH = 'main';
    const BASE_RAW = `https://raw.githubusercontent.com/${GITHUB_USER}/${GITHUB_REPO}/${BRANCH}/gallery/`;
    const API_BASE = `https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/gallery`;

    const container = document.getElementById('gallery-container');
    const lightbox = document.getElementById('lightbox');
    const lightboxIframe = document.getElementById('lightbox-iframe');
    const lightboxImg = document.getElementById('lightbox-image');

    function openLightbox(url, isVideo, videoId) {
      if (isVideo && videoId) {
        lightboxImg.style.display = 'none';
        lightboxIframe.style.display = 'block';
        lightboxIframe.src = `https://www.youtube.com/embed/${videoId}?autoplay=1`;
      } else if (isVideo && !videoId) {
        lightboxImg.style.display = 'none';
        lightboxIframe.style.display = 'block';
        lightboxIframe.src = url;
      } else {
        lightboxIframe.style.display = 'none';
        lightboxIframe.src = '';
        lightboxImg.style.display = 'block';
        lightboxImg.src = url;
      }
      lightbox.style.display = 'flex';
      document.body.style.overflow = 'hidden';
    }

    function closeLightbox() {
      lightbox.style.display = 'none';
      lightboxIframe.src = '';
      lightboxImg.src = '';
      document.body.style.overflow = 'auto';
    }

    async function fetchAlbumFolders() {
      try {
        const response = await fetch(API_BASE);
        if (!response.ok) return [];
        const contents = await response.json();
        return contents.filter(item => item.type === 'dir').map(folder => folder.name);
      } catch (error) {
        return [];
      }
    }

    // Define your videos here: folder name, filename, YouTube video ID
    const YOUTUBE_VIDEOS = {
      'armature': {
        'jointforge-demo.mp4': 'H5ySe3r7uAA'
        'second-video.mp4': 'ABCDE12345'
      }
    };

    async function fetchMediaInFolder(folderName) {
      try {
        const response = await fetch(`${API_BASE}/${folderName}`);
        if (!response.ok) return [];
        const contents = await response.json();

        const imageExtensions = ['jpg', 'jpeg', 'png', 'gif', 'webp', 'JPG', 'JPEG', 'PNG', 'GIF', 'WEBP'];

        const media = contents.filter(item => {
          if (item.type !== 'file') return false;
          const ext = item.name.split('.').pop();
          return imageExtensions.includes(ext);
        });

        const imageItems = media.map(item => ({
          name: item.name,
          url: `${BASE_RAW}${folderName}/${item.name}`,
          isVideo: false,
          videoId: null
        }));

        // Add YouTube videos based on the mapping
        const videoItems = [];
        if (YOUTUBE_VIDEOS[folderName]) {
          for (const [filename, videoId] of Object.entries(YOUTUBE_VIDEOS[folderName])) {
            if (videoId && videoId !== 'YOUR_VIDEO_ID_HERE') {
              videoItems.push({
                name: filename.replace('.mp4', '.youtube'),
                url: `https://img.youtube.com/vi/${videoId}/mqdefault.jpg`,
                isVideo: true,
                videoId: videoId,
                originalName: filename
              });
            }
          }
        }

        return [...imageItems, ...videoItems];
      } catch (error) {
        return [];
      }
    }

    function getFolderDisplayName(folderName) {
      const nameMap = {
        'progress_photos': '📸 Progress Photos',
        'failures': '💥 Failures & What Went Wrong',
        'armature': '🔧 Armature & JointForge',
        'paper_tests': '📄 Paper Cutting Tests',
        'templates': '✂️ Cutting Templates',
        'inspirations': '✨ Artists Who Inspire Me',
        'discoveries': '💡 Discoveries Along the Way',
        'solutions': '✅ Solutions That Worked'
      };
      return nameMap[folderName] || `📁 ${folderName.replace(/_/g, ' ')}`;
    }

    async function buildGallery() {
      container.innerHTML = '<div style="text-align:center; padding:60px;">Loading gallery...</div>';

      const folders = await fetchAlbumFolders();

      if (folders.length === 0) {
        container.innerHTML = `<div class="empty-album"><p>📭 No photo albums found yet.</p><p style="margin-top:20px;">Create folders inside <code>gallery/</code> and add your photos.</p></div>`;
        return;
      }

      container.innerHTML = '';

      for (const folder of folders) {
        const mediaItems = await fetchMediaInFolder(folder);

        const albumDiv = document.createElement('div');
        albumDiv.className = 'album';

        const countText = `${mediaItems.length} ${mediaItems.length === 1 ? 'item' : 'items'}`;
        const title = getFolderDisplayName(folder);
        albumDiv.innerHTML = `<h2>${title}</h2><div class="album-meta">${countText}</div><div class="gallery-grid" id="grid-${folder.replace(/[^a-zA-Z0-9]/g, '-')}"></div>`;
        container.appendChild(albumDiv);

        const gridContainer = albumDiv.querySelector('.gallery-grid');

        if (mediaItems.length === 0) {
          gridContainer.innerHTML = '<div class="empty-album">📭 No media in this album yet</div>';
        } else {
          mediaItems.forEach(media => {
            const item = document.createElement('div');
            item.className = 'gallery-item';
            if (media.isVideo) {
              item.classList.add('video-thumb');
            }
            item.onclick = () => openLightbox(media.url, media.isVideo, media.videoId);

            const img = document.createElement('img');
            img.src = media.url;
            img.alt = media.name;
            img.loading = 'lazy';
            img.onerror = function() {
              this.style.opacity = '0.3';
            };
            item.appendChild(img);

            const caption = document.createElement('div');
            caption.className = 'gallery-item-caption';
            let displayName = media.name.replace(/\.[^/.]+$/, '').substring(0, 45);
            if (media.isVideo && media.originalName) {
              displayName = '🎬 ' + media.originalName.replace(/\.[^/.]+$/, '');
            } else if (media.isVideo) {
              displayName = '🎬 ' + displayName;
            }
            caption.textContent = displayName;
            item.appendChild(caption);
            gridContainer.appendChild(item);
          });
        }
      }
    }

    buildGallery();
  </script>
</body>
</html>
